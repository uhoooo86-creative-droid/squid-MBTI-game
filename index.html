<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦑 놀이터 오징어 대회전!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&display=swap');

:root {
  --pink: #FF4B8B;
  --pink-light: #FFB3D0;
  --pink-pale: #FFF0F7;
  --green: #4BC87A;
  --green-dark: #2E8B57;
  --yellow: #FFD93D;
  --orange: #FF8C42;
  --teal: #00C9A7;
  --dark: #1C0F2E;
  --purple: #7B2FBE;
  --sky: #87CEEB;
  --red: #FF3B3B;
  --blue: #4A90E2;
  --bg-game: #1C0F2E;
  --shadow: 0 8px 32px rgba(0,0,0,0.35);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Jua', sans-serif;
  background: var(--bg-game);
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── SCREEN MANAGER ── */
.screen { display:none; width:100%; height:100vh; position:fixed; inset:0; }
.screen.active { display:flex; }

/* ══════════════════════════════════════
   INTRO SCREEN
══════════════════════════════════════ */
#introScreen {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  background: linear-gradient(180deg, #0D0720 0%, #1C0F2E 40%, #2D1B5E 100%);
  overflow-y: auto;
  padding-bottom: 40px;
}

.intro-sky {
  width: 100%; height: 220px;
  background: linear-gradient(180deg, #0D0720 0%, #1a0f3e 60%, #2d1b6e 100%);
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
}

/* 별들 */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle { from{opacity:0.3;} to{opacity:1;} }

/* 놀이터 배경 실루엣 */
.playground-silhouette {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: #0D0720;
}
.silhouette-slide {
  position: absolute;
  bottom: 0; left: 30px;
  width: 60px; height: 70px;
  background: #1a0830;
  border-radius: 4px 4px 0 0;
}
.silhouette-swing-pole {
  position: absolute;
  bottom: 0; right: 60px;
  width: 8px; height: 65px;
  background: #1a0830;
}

/* 도형들 떠다니기 */
.float-shape {
  position: absolute;
  font-size: 28px;
  animation: floatUp 4s ease-in-out infinite;
  opacity: 0.7;
}
@keyframes floatUp {
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-18px) rotate(15deg);}
}

/* 타이틀 */
.intro-title-wrap {
  text-align: center;
  padding: 24px 20px 0;
  position: relative;
  z-index: 2;
}
.intro-logo {
  font-size: 13px;
  color: var(--pink-light);
  letter-spacing: 3px;
  margin-bottom: 8px;
  opacity: 0.8;
}
.intro-title-kr {
  font-family: 'Gaegu', cursive;
  font-size: 38px;
  color: white;
  line-height: 1.2;
  text-shadow: 0 0 30px rgba(255,75,139,0.8), 3px 3px 0 var(--dark);
  margin-bottom: 6px;
}
.intro-title-sub {
  font-size: 15px;
  color: var(--yellow);
  margin-bottom: 20px;
}

/* 인트로 캐릭터 그룹 */
.intro-chars {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 16px;
  margin: 10px 0 20px;
}

/* 인트로 설명 카드 */
.intro-card {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 20px;
  margin: 0 20px 20px;
  color: white;
  font-size: 14px;
  line-height: 1.9;
  text-align: center;
}
.intro-card .highlight { color: var(--yellow); font-size: 16px; }

/* MBTI 색깔 뱃지 */
.mbti-badges {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 14px 0;
}
.mbti-badge {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  gap: 2px;
}
.mbti-badge span { font-size: 10px; color: white; opacity: 0.9; }

.badge-red { background: linear-gradient(135deg,#FF4B8B,#FF8C42); }
.badge-blue { background: linear-gradient(135deg,#4A90E2,#00C9A7); }
.badge-green { background: linear-gradient(135deg,#4BC87A,#00C9A7); }
.badge-yellow { background: linear-gradient(135deg,#FFD93D,#FF8C42); }

.start-btn-wrap { padding: 0 20px; }
.start-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: white;
  border: none;
  border-radius: 28px;
  padding: 20px;
  font-family: 'Jua', sans-serif;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 8px 30px rgba(255,75,139,0.5), 0 0 0 4px rgba(255,75,139,0.2);
  animation: pulseBtnIntro 2s infinite;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
@keyframes pulseBtnIntro {
  0%,100%{box-shadow:0 8px 30px rgba(255,75,139,0.5),0 0 0 4px rgba(255,75,139,0.2);}
  50%{box-shadow:0 8px 50px rgba(255,75,139,0.8),0 0 0 8px rgba(255,75,139,0.3);}
}
.start-btn:active { transform: scale(0.96); }

/* ══════════════════════════════════════
   GAME SCREEN
══════════════════════════════════════ */
#gameScreen {
  flex-direction: column;
  overflow: hidden;
}

/* 상단 HUD */
.hud {
  flex-shrink: 0;
  background: var(--dark);
  padding: 10px 16px 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 2px solid rgba(255,255,255,0.08);
  z-index: 10;
}
.hud-chapter {
  font-size: 12px;
  color: var(--pink-light);
  flex-shrink: 0;
  letter-spacing: 0.5px;
}
.hud-bar-wrap {
  flex: 1;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}
.hud-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--yellow));
  border-radius: 10px;
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.hud-ring {
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  position: relative;
  overflow: hidden;
}

/* 씬 영역 */
.scene-area {
  flex: 0 0 auto;
  height: 230px;
  position: relative;
  overflow: hidden;
}

/* 스크롤 가능한 하단 */
.bottom-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── 배경 타입별 ── */
.bg-pink-sky {
  background: linear-gradient(180deg, #FFB3D0 0%, #FF85B3 30%, #FFCCE5 60%, #C8F7C5 100%);
}
.bg-night {
  background: linear-gradient(180deg, #1C0F2E 0%, #2D1B5E 60%, #1a3a2a 100%);
}
.bg-rain {
  background: linear-gradient(180deg, #4A6FA5 0%, #6B8CBF 50%, #8AAAD4 100%);
}
.bg-sand {
  background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 40%, #F4E4BC 70%, #E8D5A3 100%);
}
.bg-sunset {
  background: linear-gradient(180deg, #FF6B6B 0%, #FFA07A 40%, #FFD93D 80%, #98FB98 100%);
}

/* 땅 */
.ground {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 36px;
  border-radius: 50% 50% 0 0 / 20px 20px 0 0;
}
.ground-pink { background: linear-gradient(180deg, #98E890, #6BC96B); }
.ground-dark { background: linear-gradient(180deg, #1a3a2a, #0d1f15); }
.ground-sand { background: linear-gradient(180deg, #DEB887, #C19A5E); }
.ground-wet { background: linear-gradient(180deg, #4a7a5a, #2d5a3d); }

/* 구름 */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.85);
  border-radius: 50px;
  animation: cloudDrift 8s ease-in-out infinite alternate;
}
@keyframes cloudDrift { from{transform:translateX(-8px);} to{transform:translateX(8px);} }

/* 놀이터 소품들 */
.prop {
  position: absolute;
  bottom: 36px;
}

/* ── CSS 캐릭터 시스템 ── */
.char {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  bottom: 36px;
  transform-origin: bottom center;
}

/* Fall Guys 콩 몸통 */
.char-body {
  border-radius: 50% 50% 45% 45% / 55% 55% 45% 45%;
  position: relative;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 6px;
}
.char-body-player { width:52px; height:62px; background:linear-gradient(160deg,#5CD85C,#3AB03A); box-shadow:inset -6px -8px 0 rgba(0,0,0,0.15), inset 4px 4px 0 rgba(255,255,255,0.2); }
.char-body-teacher { width:62px; height:74px; background:linear-gradient(160deg,#FF85B3,#FF4B8B); box-shadow:inset -7px -10px 0 rgba(0,0,0,0.12), inset 5px 5px 0 rgba(255,255,255,0.2); }
.char-body-tri { width:44px; height:54px; background:linear-gradient(160deg,#FF6B6B,#FF3B3B); box-shadow:inset -5px -7px 0 rgba(0,0,0,0.12); }
.char-body-circle { width:44px; height:54px; background:linear-gradient(160deg,#4A90E2,#2166C4); box-shadow:inset -5px -7px 0 rgba(0,0,0,0.12); }
.char-body-daldal { width:48px; height:58px; background:linear-gradient(160deg,#FFB347,#FF8C42); box-shadow:inset -5px -7px 0 rgba(0,0,0,0.12); }
.char-body-thunder { width:48px; height:58px; background:linear-gradient(160deg,#FFD93D,#FFC107); box-shadow:inset -5px -7px 0 rgba(0,0,0,0.12); }

/* 마스크 얼굴 */
.char-face {
  position: absolute;
  top: -22px; left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 플레이어 얼굴 (큰 눈 쿠키런 스타일) */
.face-player {
  width: 48px; height: 44px;
  background: linear-gradient(160deg, #FFDDB3, #FFCC88);
  border-radius: 50%;
  position: relative;
  box-shadow: inset -3px -4px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.2);
  overflow: hidden;
}
.player-eye-l, .player-eye-r {
  position: absolute;
  top: 12px;
  width: 13px; height: 15px;
  background: white;
  border-radius: 50%;
  overflow: hidden;
}
.player-eye-l { left: 6px; }
.player-eye-r { right: 6px; }
.pupil {
  position: absolute;
  bottom: 1px; left: 50%; transform: translateX(-50%);
  width: 9px; height: 11px;
  background: #1C0F2E;
  border-radius: 50%;
}
.pupil::after {
  content:'';
  position:absolute;
  top:1px; right:1px;
  width:3px; height:3px;
  background:white;
  border-radius:50%;
}
.player-mouth {
  position: absolute;
  bottom: 7px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 7px;
  border-bottom: 3px solid #CC7744;
  border-radius: 0 0 8px 8px;
}
.player-cheek-l, .player-cheek-r {
  position: absolute;
  bottom: 9px;
  width: 9px; height: 6px;
  background: rgba(255,120,120,0.4);
  border-radius: 50%;
}
.player-cheek-l { left: 2px; }
.player-cheek-r { right: 2px; }

/* 오징어 선생님 황금 ■ 마스크 */
.face-teacher {
  width: 58px; height: 52px;
  background: linear-gradient(160deg, #FFD700, #FFA500);
  border-radius: 10px;
  position: relative;
  box-shadow: 0 4px 12px rgba(255,165,0,0.5), inset -4px -5px 0 rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
}
.mask-symbol {
  font-size: 26px;
  color: rgba(0,0,0,0.55);
  font-weight: bold;
  line-height: 1;
}
.mask-eyes-hidden {
  position: absolute;
  bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 30px; height: 5px;
  background: rgba(0,0,0,0.3);
  border-radius: 3px;
}

/* 삼각이(▲) 빨간 마스크 */
.face-tri {
  width: 40px; height: 36px;
  background: linear-gradient(160deg, #FF8080, #FF4444);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-top: 12px;
}

/* 동그리(●) 파란 마스크 */
.face-circle {
  width: 40px; height: 40px;
  background: linear-gradient(160deg, #6BAEE8, #3A7FD5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: inset -3px -4px 0 rgba(0,0,0,0.12);
}

/* 달달이/번개 일반 얼굴 */
.face-small {
  width: 42px; height: 38px;
  background: linear-gradient(160deg, #FFDDB3, #FFCC88);
  border-radius: 50%;
  position: relative;
  box-shadow: inset -2px -3px 0 rgba(0,0,0,0.1);
  overflow: hidden;
}
.small-eye-l, .small-eye-r {
  position: absolute;
  top: 10px;
  width: 10px; height: 12px;
  background: white;
  border-radius: 50%;
  overflow: hidden;
}
.small-eye-l { left: 5px; }
.small-eye-r { right: 5px; }
.small-pupil {
  position: absolute;
  bottom: 1px; left: 50%; transform: translateX(-50%);
  width: 7px; height: 9px;
  background: #1C0F2E;
  border-radius: 50%;
}
.small-mouth {
  position: absolute;
  bottom: 6px; left: 50%; transform: translateX(-50%);
  width: 12px; height: 5px;
  border-bottom: 2px solid #CC7744;
  border-radius: 0 0 6px 6px;
}

/* 다리 */
.char-legs {
  display: flex;
  gap: 6px;
  margin-top: -4px;
}
.leg {
  width: 14px; height: 18px;
  border-radius: 0 0 8px 8px;
}
.leg-player { background: linear-gradient(180deg,#2E8B57,#1a5c38); }
.leg-teacher { background: linear-gradient(180deg,#FF4B8B,#CC1A5E); }
.leg-tri { background: linear-gradient(180deg,#CC2222,#991111); }
.leg-circle { background: linear-gradient(180deg,#2166C4,#1044A0); }
.leg-daldal { background: linear-gradient(180deg,#CC6622,#994411); }
.leg-thunder { background: linear-gradient(180deg,#CCA000,#997700); }

/* 발 */
.char-feet {
  display: flex;
  gap: 4px;
  margin-top: 0;
}
.foot {
  width: 18px; height: 10px;
  border-radius: 0 0 8px 8px;
  background: #2C1810;
}

/* 표정 변화 오버레이 */
.expression-overlay {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
}
/* 놀란 눈 커짐 */
.expr-shocked .player-eye-l,
.expr-shocked .player-eye-r { transform: scaleY(1.4); }
.expr-shocked .player-mouth {
  width: 12px; height: 10px;
  border: 3px solid #CC7744;
  border-radius: 50%;
  border-top: none;
}
/* 행복한 */
.expr-happy .player-mouth {
  width: 20px; height: 9px;
}
/* 우는 */
.expr-cry .player-mouth {
  border-radius: 8px 8px 0 0;
  bottom: 9px;
}

/* 캐릭터 애니메이션 */
@keyframes charBounceIn {
  0%{opacity:0;transform:scale(0.3) rotate(-15deg);}
  70%{transform:scale(1.1) rotate(5deg);}
  100%{opacity:1;transform:scale(1) rotate(0deg);}
}
@keyframes charWobble {
  0%,100%{transform:rotate(0deg);}
  25%{transform:rotate(-8deg) scaleX(1.05);}
  75%{transform:rotate(8deg) scaleX(0.95);}
}
@keyframes charJump {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}
@keyframes charShake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-10px) rotate(-5deg);}
  40%{transform:translateX(10px) rotate(5deg);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}
}
@keyframes charFall {
  0%{transform:rotate(0deg);}
  100%{transform:rotate(90deg) translateY(10px);}
}
@keyframes teacherFloat {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

.anim-bounce { animation: charBounceIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
.anim-wobble { animation: charWobble 0.5s ease; }
.anim-jump { animation: charJump 0.6s ease infinite; }
.anim-shake { animation: charShake 0.4s ease; }
.anim-fall { animation: charFall 0.4s ease forwards; }
.anim-float { animation: teacherFloat 3s ease-in-out infinite; }

/* 말풍선 */
.speech-bubble {
  position: absolute;
  background: white;
  border-radius: 18px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--dark);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  max-width: 180px;
  text-align: center;
  z-index: 5;
}
.speech-bubble::after {
  content:'';
  position:absolute;
  bottom:-12px; left:50%;
  transform:translateX(-50%);
  border:12px solid transparent;
  border-top-color:white;
  border-bottom:0;
}
.speech-bubble.left::after {
  left:auto; right:auto;
  bottom:auto; top:50%;
  transform:translateY(-50%);
  right:-12px; left:auto;
  border-right:0;
  border-left-color:white;
  border:12px solid transparent;
  border-right:0;
  border-left-color:white;
}
.speech-bubble.angry {
  background: #FFF0F0;
  border: 2px solid var(--red);
}
.speech-bubble.shout {
  background: var(--yellow);
  border-radius: 0;
  clip-path: polygon(0 8px,8px 8px,8px 0,calc(100% - 8px) 0,calc(100% - 8px) 8px,100% 8px,100% calc(100% - 8px),calc(100% - 8px) calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,8px calc(100% - 8px),0 calc(100% - 8px));
}

/* 효과 텍스트 */
.sfx-text {
  position: absolute;
  font-family: 'Gaegu', cursive;
  font-size: 28px;
  font-weight: bold;
  color: var(--yellow);
  text-shadow: 3px 3px 0 var(--dark), -1px -1px 0 var(--dark);
  animation: sfxPop 0.8s ease-out forwards;
  pointer-events: none;
  z-index: 20;
  white-space: nowrap;
}
@keyframes sfxPop {
  0%{opacity:0;transform:scale(0.3) rotate(-10deg);}
  40%{opacity:1;transform:scale(1.3) rotate(5deg);}
  70%{transform:scale(0.95) rotate(-2deg);}
  100%{opacity:0;transform:scale(1) translateY(-20px) rotate(0deg);}
}

/* 소품들 */
.slide-prop {
  position: absolute;
  right: 20px; bottom: 36px;
}
/* 미끄럼틀 */
.slide-structure {
  width: 70px; height: 80px;
  position: relative;
}
.slide-pole { position:absolute; bottom:0; right:8px; width:8px; height:70px; background:#FF8C42; border-radius:4px; }
.slide-ramp {
  position:absolute; bottom:12px; left:0; right:0;
  height:8px; background:linear-gradient(90deg,#FF4B8B,#FF8C42);
  border-radius:4px;
  transform:rotate(-35deg); transform-origin:right bottom;
}
.slide-top { position:absolute; top:0; right:2px; width:30px; height:14px; background:#FF4B8B; border-radius:4px; }

/* 그네 */
.swing-prop { position:absolute; left:20px; bottom:36px; }
.swing-bar { width:80px; height:8px; background:#8B4513; border-radius:4px; }
.swing-rope-l { position:absolute; top:8px; left:15px; width:3px; height:50px; background:#8B6914; }
.swing-rope-r { position:absolute; top:8px; right:15px; width:3px; height:50px; background:#8B6914; }
.swing-seat { position:absolute; top:58px; left:8px; width:64px; height:10px; background:#8B4513; border-radius:4px; }

/* 모래성 */
.sandcastle { position:absolute; left:10px; bottom:36px; }
.castle-base { width:70px; height:30px; background:linear-gradient(180deg,#F4C070,#DEB060); border-radius:4px; }
.castle-tower-l { position:absolute; top:-25px; left:5px; width:18px; height:25px; background:linear-gradient(180deg,#F4C070,#DEB060); border-radius:3px 3px 0 0; }

/* ════════════════════════════════
   캐릭터 빌더 함수들
════════════════════════════════ */
function buildPlayerChar(size='normal', expr='normal') {
  const s = size === 'small' ? 0.7 : 1;
  const w = Math.round(52*s), h = Math.round(62*s), fw = Math.round(48*s), fh = Math.round(44*s);
  const lw = Math.round(14*s), lh = Math.round(18*s), ftw = Math.round(18*s), fth = Math.round(10*s);
  const eyeW = Math.round(13*s), eyeH = Math.round(15*s), pupilW = Math.round(9*s), pupilH = Math.round(11*s);

  let mouthExtra = '';
  if(expr==='happy') mouthExtra = 'border-radius:0 0 12px 12px;width:'+Math.round(20*s)+'px;';
  if(expr==='shocked') mouthExtra = 'border-radius:50%;width:'+Math.round(12*s)+'px;height:'+Math.round(10*s)+'px;border:3px solid #CC7744;border-top:none;';
  if(expr==='sad') mouthExtra = 'border-radius:8px 8px 0 0;bottom:'+Math.round(11*s)+'px;';
  if(expr==='excited') mouthExtra = 'width:'+Math.round(22*s)+'px;height:'+Math.round(10*s)+'px;';

function buildTeacherChar(size='normal', maskSymbol='■') {
  const s = size === 'small' ? 0.75 : 1;
  const bw=Math.round(62*s), bh=Math.round(74*s), mw=Math.round(58*s), mh=Math.round(52*s);

  return `<div class="char anim-float">
    <div class="char-face">

        <div style="position:absolute;bottom:${Math.round(10*s)}px;left:50%;transform:translateX(-50%);width:${Math.round(30*s)}px;height:${Math.round(5*s)}px;background:rgba(0,0,0,0.25);border-radius:3px;"></div>

    </div>
    <div style="width:${bw}px;height:${bh}px;background:linear-gradient(160deg,#FF85B3,#FF4B8B);border-radius:50% 50% 45% 45%/55% 55% 45% 45%;position:relative;box-shadow:inset -7px -10px 0 rgba(0,0,0,0.12),inset 5px 5px 0 rgba(255,255,255,0.2);"></div>
    <div style="display:flex;gap:${Math.round(6*s)}px;margin-top:-4px;">

      <div style="width:${lw}px;height:${lh}px;border-radius:0 0 8px 8px;background:linear-gradient(180deg,#FF4B8B,#CC1A5E);"></div>
    </div>
    <div style="display:flex;gap:4px;">

      <div style="width:${ftw}px;height:${fth}px;border-radius:0 0 8px 8px;background:#2C1810;"></div>
    </div>
  </div>`;
}

function buildSideChar(type, size='small') {
  const s = 0.75;
  const configs = {
    tri: {bw:44,bh:54,bg:'linear-gradient(160deg,#FF6B6B,#FF3B3B)',faceBg:'#FF4444',faceW:38,faceH:34,legBg:'linear-gradient(180deg,#CC2222,#991111)',symbol:'▲',symbolColor:'rgba(255,255,255,0.7)'},
    circle: {bw:44,bh:54,bg:'linear-gradient(160deg,#4A90E2,#2166C4)',faceBg:'#3A7FD5',faceW:38,faceH:38,legBg:'linear-gradient(180deg,#2166C4,#1044A0)',symbol:'●',symbolColor:'rgba(255,255,255,0.7)'},
    daldal: {bw:46,bh:56,bg:'linear-gradient(160deg,#FFB347,#FF8C42)',faceBg:'#FFDDB3',faceW:40,faceH:36,legBg:'linear-gradient(180deg,#CC6622,#994411)',symbol:'😊',isEmoji:true},
    thunder: {bw:46,bh:56,bg:'linear-gradient(160deg,#FFD93D,#FFC107)',faceBg:'#FFDDB3',faceW:40,faceH:36,legBg:'linear-gradient(180deg,#CCA000,#997700)',symbol:'⚡',isEmoji:true},
  };
  const c = configs[type];
  const bw=Math.round(c.bw*s),bh=Math.round(c.bh*s),fw=Math.round(c.faceW*s),fh=Math.round(c.faceH*s);
  const lw=Math.round(12*s),lh=Math.round(15*s),ftw=Math.round(15*s),fth=Math.round(8*s);
  const isCircle = type==='circle';
  const faceStyle = isCircle ? `border-radius:50%` : type==='tri'?`clip-path:polygon(50% 0%,0% 100%,100% 100%);padding-top:${Math.round(14*s)}px`:'border-radius:50%';

  const faceContent = (type==='daldal'||type==='thunder') ?
    `<span style="font-size:${Math.round(18*s)}px">${c.symbol}</span>` :
    `<span style="font-size:${Math.round(16*s)}px;color:${c.symbolColor}">${c.symbol}</span>`;

  return `<div class="char">
    <div class="char-face">
      <div style="width:${fw}px;height:${fh}px;background:${c.faceBg};${faceStyle};display:flex;align-items:center;justify-content:center;box-shadow:inset -2px -3px 0 rgba(0,0,0,0.1);">
        ${faceContent}
      </div>
    </div>
    <div style="width:${bw}px;height:${bh}px;background:${c.bg};border-radius:50% 50% 45% 45%/55% 55% 45% 45%;box-shadow:inset -4px -6px 0 rgba(0,0,0,0.12);"></div>
    <div style="display:flex;gap:4px;margin-top:-3px;">
      <div style="width:${lw}px;height:${lh}px;border-radius:0 0 6px 6px;background:${c.legBg};"></div>
      <div style="width:${lw}px;height:${lh}px;border-radius:0 0 6px 6px;background:${c.legBg};"></div>
    </div>
  </div>`;
}

    const el=document.createElement('div');
    el.className='float-shape';
    el.style.cssText=`color:${sh.c};${sh.p};animation-delay:${sh.d}`;
    el.textContent=sh.t;
    sky.appendChild(el);
  });

  const introChars=document.getElementById('introChars');
  introChars.innerHTML=buildSideChar('tri','small')+buildTeacherChar('normal','■')+buildPlayerChar('normal','happy')+buildSideChar('daldal','small')+buildSideChar('circle','small');
})();

/* ════════════════════════════════
   게임 시작
════════════════════════════════ */
function startGame(){
  scores={E:0,I:0,S:0,N:0,F:0,T:0,J:0,P:0};
  stepIndex=0; ringBits={E:false,S:false,F:false,J:false};
  updateRingDots();
  showScreen('gameScreen');
  renderStep();
}

/* ════════════════════════════════
   스텝 렌더링
════════════════════════════════ */
function renderStep(){
  const step=getStep();
  if(!step){ showResult(); return; }
  if(step.type==='cinematic'){ renderCinematic(step); return; }
  renderGame(step);
}

function renderGame(ch){
  showScreen('gameScreen');
  // HUD
  const prog=Math.round((stepIndex/chapters.length)*100);
  document.getElementById('hudBar').style.width=prog+'%';
  document.getElementById('hudChapter').textContent=ch.badge;

  // 씬 영역
  const scene=document.getElementById('sceneArea');
  scene.className='scene-area '+ch.bgClass;

  let html='';
  // 구름
  if(ch.clouds){
    html+=`<div class="cloud" style="width:90px;height:30px;top:20px;left:10%;animation-delay:0s"></div>`;
    html+=`<div class="cloud" style="width:60px;height:22px;top:30px;right:15%;animation-delay:2s;opacity:0.7"></div>`;
  }
  // 빗방울
  if(ch.hasRain){
    html+='<div class="rain-container">';
    for(let i=0;i<18;i++){
      const h=40+Math.random()*60;
      html+=`<div class="raindrop" style="left:${Math.random()*100}%;height:${h}px;animation-duration:${0.6+Math.random()*0.5}s;animation-delay:${Math.random()*0.8}s"></div>`;
    }
    html+='</div>';
  }
  // 땅
  html+=`<div class="ground ${ch.groundClass}"></div>`;
  // 소품
  html+=(ch.props||'');
  // 선생님
  html+=`<div style="position:absolute;${ch.teacherPos}" class="anim-bounce">${buildTeacherChar('normal','■')}</div>`;
  // 플레이어
  html+=`<div style="position:absolute;${ch.playerPos}" class="anim-bounce" style="animation-delay:0.1s">${buildPlayerChar('normal','normal')}</div>`;
  // 사이드 캐릭터
  (ch.sideChars||[]).forEach(sc=>{
    html+=`<div style="position:absolute;${sc.pos}" class="anim-bounce">${buildSideChar(sc.type,'small')}</div>`;
  });
  // 말풍선
  if(ch.speechBubble){
    html+=`<div class="speech-bubble shout" style="position:absolute;${ch.speechBubble.pos};font-size:13px;max-width:140px">${ch.speechBubble.text}</div>`;
  }

  scene.innerHTML=html;

  // 컨텐츠
  document.getElementById('teacherText').innerHTML=ch.teacher.replace(/\n/g,'<br>');
  document.getElementById('sceneCaption').innerHTML=ch.scene.replace(/\n/g,'<br>');
  document.getElementById('questionText').textContent=ch.question;

  const cw=document.getElementById('choicesWrap');
  cw.innerHTML=ch.choices.map((c,i)=>`
    <button class="choice-btn btn-${c.label}" id="choiceBtn${i}" onclick="selectChoice(${i})">
      <div class="choice-icon-wrap">${c.icon}</div>
      <div class="choice-content">
        <div class="choice-main-text">${c.text}</div>
        <div class="choice-sfx">효과음: ${c.sfx}</div>
      </div>
    </button>
  `).join('');
}

/* ════════════════════════════════
   선택 처리
════════════════════════════════ */
function selectChoice(idx){
  const ch=getStep();
  if(ch.type!=='game') return;
  lastChoiceIdx=idx;
  const choice=ch.choices[idx];

  // 버튼 시각 효과
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    if(i===idx) b.classList.add('chosen');
    else b.classList.add('not-chosen');
  });

  // 점수 계산
  const a=choice.axis;
  if(a==='E') scores.E+=2;
  else if(a==='I') scores.I+=2;
  else if(a==='EI_n'){scores.E+=1;scores.I+=1;}
  else if(a==='S') scores.S+=2;
  else if(a==='N') scores.N+=2;
  else if(a==='SN_n'){scores.S+=1;scores.N+=1;}
  else if(a==='F') scores.F+=2;
  else if(a==='T') scores.T+=2;
  else if(a==='FT_n'){scores.F+=1;scores.T+=1;}
  else if(a==='J') scores.J+=2;
  else if(a==='P') scores.P+=2;
  else if(a==='JP_n'){scores.J+=1;scores.P+=1;}

  // 반지 업데이트
  updateRingProgress();

  // SFX 효과음 텍스트
  const sfxEl=document.createElement('div');
  sfxEl.className='sfx-text';
  sfxEl.textContent=choice.sfx;
  sfxEl.style.cssText='top:40%;left:50%;transform:translate(-50%,-50%)';
  document.getElementById('sceneArea').appendChild(sfxEl);

  setTimeout(()=>showReaction(ch,idx), 400);
}

function updateRingProgress(){
  const step=getStep();
  if(!step||step.type!=='game') return;
  const axisGroup={
    E:'E',I:'E',EI_n:'E',
    S:'S',N:'S',SN_n:'S',
    F:'F',T:'F',FT_n:'F',
    J:'J',P:'J',JP_n:'J'
  };
  const choice=step.choices[lastChoiceIdx||0];
  if(!choice) return;
  const grp=axisGroup[choice.axis];
  if(grp) ringBits[grp]=true;
  updateRingDots();
}

function updateRingDots(){
  const map={E:'dot-E',S:'dot-S',F:'dot-F',J:'dot-J'};
  Object.keys(map).forEach(k=>{
    const el=document.getElementById(map[k]);
    if(el) el.className='ring-dot'+(ringBits[k]?' lit-'+k:'');
  });
}

/* ════════════════════════════════
   반응 팝업
════════════════════════════════ */
function showReaction(ch,idx){
  const r=ch.reactions[idx];
  document.getElementById('reactionEmoji').textContent=r.emoji;
  document.getElementById('reactionTitle').textContent=r.title;
  document.getElementById('reactionDesc').textContent=r.desc;
  document.getElementById('reactionBar').style.background=r.bar;

  // 미니 씬
  const mini=document.getElementById('reactionMiniScene');
  const parts=r.miniScene.split(',');
  mini.innerHTML='';
  parts.forEach(p=>{
    const [type,expr]=p.split(':');
    let charHTML='';
    if(type==='player') charHTML=buildPlayerChar('small',expr||'happy');
    else if(type==='teacher') charHTML=buildTeacherChar('small');
    else charHTML=buildSideChar(type,'small');
    const wrap=document.createElement('div');
    wrap.style.cssText='display:flex;flex-direction:column;align-items:center;animation:charBounceIn 0.4s both';
    wrap.innerHTML=charHTML;
    mini.appendChild(wrap);
  });

  showScreen('reactionScreen');
}

/* ════════════════════════════════
   다음 스텝
════════════════════════════════ */
function nextStep(){
  stepIndex++;
  renderStep();
}

/* ════════════════════════════════
   시네마틱
════════════════════════════════ */
function renderCinematic(step){
  showScreen('cinematicScreen');
  document.getElementById('cinematicTitle').textContent=step.title;

  // 씬
  const sa=document.getElementById('cinematicSceneArea');
  if(step.sceneType==='night_playground'){
    sa.innerHTML=`
      <div style="position:absolute;bottom:0;left:0;right:0;height:40px;background:#0d1f15;border-radius:50% 50% 0 0/20px 20px 0 0"></div>
      <div style="position:absolute;bottom:8px;left:40px">${buildTeacherChar('small')}</div>
      <div style="position:absolute;bottom:8px;right:40px">${buildSideChar('tri','small')}</div>
      <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%)">${buildSideChar('circle','small')}</div>
      <div style="position:absolute;top:15px;right:20px;font-size:22px">🌙</div>
      <div style="position:absolute;top:20px;left:20px;font-size:16px">⭐</div>
      <div style="position:absolute;top:10px;left:50%;font-size:14px">✨</div>
    `;
  } else {
    sa.innerHTML=`
      <div style="display:flex;align-items:center;justify-content:center;height:100%;gap:16px">
        ${buildTeacherChar('normal','■')}
        <div style="font-size:40px;animation:charJump 0.5s ease infinite">✨</div>
        <div style="text-align:center;color:var(--yellow);font-size:16px;line-height:1.5">황금 수트<br>변신! ✨</div>
      </div>
    `;
  }

  // 대화 - 타이머로 순차 표시
  const dlg=document.getElementById('cinematicDialogue');
  dlg.innerHTML='';
  step.dialogues.forEach((d,i)=>{
    setTimeout(()=>{
      const line=document.createElement('div');
      line.className='dialogue-line';
      line.style.animationDelay=`0s`;
      line.innerHTML=`
        <div class="dialogue-speaker" style="background:${d.speakerBg}">${d.speaker}</div>
        <div class="dialogue-text">
          <div class="speaker-name">${d.name}</div>
          ${d.text.replace(/\n/g,'<br>')}
        </div>
      `;
      dlg.appendChild(line);
      dlg.scrollTop=dlg.scrollHeight;
    }, d.delay);
  });
}

function cinematicNext(){
  stepIndex++;
  renderStep();
}

/* ════════════════════════════════
   결과 화면
════════════════════════════════ */
function showResult(){
  const ei=scores.E>=scores.I?'E':'I';
  const sn=scores.S>=scores.N?'S':'N';
  const ft=scores.F>=scores.T?'F':'T';
  const jp=scores.J>=scores.P?'J':'P';
  const mbti=ei+sn+ft+jp;
  const r=mbtiResults[mbti]||mbtiResults['ENFP'];

  document.getElementById('resultMbti').textContent=mbti;
  document.getElementById('resultNickname').textContent=r.nn;
  document.getElementById('resultTrophyTitle').textContent='🏆 '+r.nn;
  document.getElementById('resultDesc').textContent=r.desc;
  document.getElementById('resultTeacherComment').textContent=r.comment;

  // 결과 캐릭터 (큰)
  const rcb=document.getElementById('resultCharBig');
  rcb.innerHTML=`<div style="font-size:80px;animation:charBounceIn 0.6s both">${r.ch}</div>`;

  // 글로우 색
  const glowColors={'E':'#FF4B8B','I':'#4A90E2','S':'#4A90E2','N':'#7B2FBE','F':'#4BC87A','T':'#4A90E2','J':'#FFD93D','P':'#FF8C42'};
  document.getElementById('resultGlow').style.background=`radial-gradient(circle,${glowColors[ei]}44,transparent)`;

  // 특성 태그
  document.getElementById('resultTraits').innerHTML=r.traits.map(t=>`<div class="result-trait">#${t}</div>`).join('');

  showScreen('resultScreen');
  launchFireworks();
}

function launchFireworks(){
  const area=document.getElementById('confetti');
  const emojis=['🎊','🎉','⭐','🌟','💫','🎈','🦑','💍','🏆','✨','🌈','💥'];
  for(let i=0;i<30;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-p';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.cssText=`left:${Math.random()*100}vw;font-size:${14+Math.random()*16}px;animation-duration:${2+Math.random()*2}s;animation-delay:0s`;
      area.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    },i*100);
  }
}

function restartGame(){
  scores={E:0,I:0,S:0,N:0,F:0,T:0,J:0,P:0};
  stepIndex=0; ringBits={E:false,S:false,F:false,J:false};
  showScreen('introScreen');
}
</script>
