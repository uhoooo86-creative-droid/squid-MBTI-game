<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🦑 놀이터 오징어 대회전</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Comic&family=Jua&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --squid-pink:#E84393;
  --squid-dark:#0D0D1A;
  --squid-teal:#00C9A7;
  --squid-yellow:#FFD600;
  --squid-red:#FF3131;
  --panel-bg:#FFFEF0;
  --ink:#1a1a2e;
}

body{
  font-family:'Jua',sans-serif;
  background:var(--squid-dark);
  min-height:100vh;
  overflow:hidden;
  cursor:default;
}

/* ── 인트로 화면 ── */
#intro{
  position:fixed;inset:0;z-index:999;
  background:var(--squid-dark);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}
.intro-doll{
  animation:dollSway 2s ease-in-out infinite;
  margin-bottom:16px;
}
@keyframes dollSway{
  0%,100%{transform:rotate(-5deg);}
  50%{transform:rotate(5deg);}
}
.intro-logo{
  font-size:28px;color:var(--squid-pink);
  text-shadow:0 0 30px rgba(232,67,147,0.8);
  margin-bottom:8px;text-align:center;
  line-height:1.3;
}
.intro-sub{
  color:var(--squid-yellow);font-size:14px;
  margin-bottom:6px;text-align:center;
}
.intro-desc{
  color:rgba(255,255,255,0.6);font-size:12px;
  text-align:center;line-height:1.8;
  max-width:320px;margin-bottom:28px;
}
.intro-shapes{
  display:flex;gap:20px;margin-bottom:20px;
}
.intro-shape{
  width:44px;height:44px;
  border:3px solid var(--squid-pink);
  display:flex;align-items:center;justify-content:center;
  color:var(--squid-pink);font-size:18px;font-weight:bold;
}
.shape-circle{border-radius:50%;}
.shape-tri{
  clip-path:polygon(50% 0%,0% 100%,100% 100%);
  border:none;background:var(--squid-pink);
  color:var(--squid-dark);
}
.start-btn{
  background:var(--squid-pink);
  color:white;border:none;
  padding:16px 44px;border-radius:0;
  font-family:'Jua',sans-serif;font-size:20px;
  cursor:pointer;
  box-shadow:6px 6px 0 var(--squid-yellow);
  transition:all .15s;
  letter-spacing:2px;
}
.start-btn:hover{transform:translate(-3px,-3px);box-shadow:9px 9px 0 var(--squid-yellow);}
.start-btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 var(--squid-yellow);}

/* ── 게임 화면 ── */
#game{
  position:fixed;inset:0;
  display:none;
  flex-direction:column;
  background:var(--squid-dark);
  overflow:hidden;
}

/* 상단 HUD */
.hud{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:10px 16px;
  background:#000;
  border-bottom:3px solid var(--squid-pink);
  flex-shrink:0;
}
.hud-chapter{
  color:var(--squid-pink);font-size:13px;
  display:flex;align-items:center;gap:6px;
}
.hud-progress{
  flex:1;height:8px;background:#222;
  margin:0 12px;border:2px solid #444;
}
.hud-bar{
  height:100%;background:linear-gradient(90deg,var(--squid-pink),var(--squid-yellow));
  transition:width .5s ease;
}
.hud-count{color:white;font-size:12px;opacity:.7;}

/* 만화 패널 영역 */
.comic-area{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* 만화 패널들 */
.panels-wrap{
  flex:1;
  display:grid;
  gap:3px;
  padding:8px;
  background:var(--squid-dark);
  overflow:hidden;
}

/* 기본 2행 레이아웃 */
.layout-2row{
  grid-template-rows:1fr 1fr;
  grid-template-columns:1fr 1fr;
}
.layout-2row .panel:first-child{
  grid-column:1/-1;
}

.panel{
  background:var(--panel-bg);
  border:3px solid var(--ink);
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.panel-inner{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* 효과선 배경 */
.speed-lines{
  position:absolute;inset:0;
  pointer-events:none;
  opacity:.08;
}

/* 말풍선 스타일들 */
.bubble{
  position:absolute;
  background:white;
  border:2px solid var(--ink);
  padding:6px 10px;
  font-family:'Jua',sans-serif;
  font-size:11px;
  line-height:1.4;
  max-width:120px;
  z-index:10;
  text-align:center;
}
.bubble-round{border-radius:16px;}
.bubble-shout{
  background:var(--squid-yellow);
  clip-path:polygon(0 15%,85% 15%,85% 0,100% 50%,85% 100%,85% 85%,0 85%);
  border:none;font-size:13px;font-weight:bold;
  padding:10px 14px;
}
.bubble-tail-l::after{
  content:'';position:absolute;
  bottom:-10px;left:14px;
  border:10px solid transparent;
  border-top-color:var(--ink);
}
.bubble-tail-l::before{
  content:'';position:absolute;
  bottom:-7px;left:15px;
  border:9px solid transparent;
  border-top-color:white;z-index:1;
}
.bubble-tail-r::after{
  content:'';position:absolute;
  bottom:-10px;right:14px;
  border:10px solid transparent;
  border-top-color:var(--ink);
}
.bubble-tail-r::before{
  content:'';position:absolute;
  bottom:-7px;right:15px;
  border:9px solid transparent;
  border-top-color:white;z-index:1;
}

/* 효과음 텍스트 */
.sfx{
  font-family:'Jua',sans-serif;
  color:var(--squid-red);
  font-size:22px;
  font-weight:900;
  text-shadow:3px 3px 0 var(--ink),-1px -1px 0 var(--ink);
  transform:rotate(-8deg);
  display:inline-block;
  position:absolute;
}

/* 패널 캡션 */
.caption{
  position:absolute;top:6px;left:6px;
  background:var(--ink);color:white;
  font-size:10px;padding:2px 6px;
  font-family:'Jua',sans-serif;
}

/* 선택 영역 */
.choice-area{
  flex-shrink:0;
  background:#111;
  border-top:4px solid var(--squid-pink);
  padding:10px;
}
.choice-question{
  color:var(--squid-yellow);
  font-size:14px;text-align:center;
  margin-bottom:8px;
  text-shadow:0 0 10px rgba(255,214,0,.5);
}
.choices-grid{
  display:flex;gap:8px;
}
.choice-card{
  flex:1;
  background:var(--panel-bg);
  border:3px solid var(--ink);
  border-radius:0;
  padding:10px 6px;
  cursor:pointer;
  font-family:'Jua',sans-serif;
  font-size:11px;
  text-align:center;
  transition:all .15s;
  position:relative;
  line-height:1.4;
  box-shadow:3px 3px 0 rgba(0,0,0,.5);
  display:flex;flex-direction:column;
  align-items:center;gap:4px;
}
.choice-card:hover{
  transform:translate(-2px,-2px);
  box-shadow:5px 5px 0 rgba(0,0,0,.7);
}
.choice-card:active{transform:translate(1px,1px);box-shadow:1px 1px 0;}
.choice-card.A{border-color:var(--squid-red);background:#FFF5F5;}
.choice-card.B{border-color:var(--squid-teal);background:#F0FFFC;}
.choice-card.C{border-color:var(--squid-yellow);background:#FFFBF0;}
.choice-icon-big{font-size:26px;}
.choice-sfx{font-size:9px;color:#999;font-style:italic;}

/* ── 반응 오버레이 ── */
#reaction{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  z-index:500;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.reaction-comic{
  background:var(--panel-bg);
  border:4px solid var(--ink);
  max-width:360px;width:100%;
  box-shadow:8px 8px 0 var(--squid-pink);
  animation:comicPop .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes comicPop{
  from{transform:scale(.3) rotate(-15deg);opacity:0;}
  to{transform:scale(1) rotate(0);opacity:1;}
}
.reaction-panel{
  height:180px;
  background:#fff;
  border-bottom:3px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.reaction-info{
  padding:14px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.reaction-sfx-big{
  font-size:32px;font-weight:900;
  color:var(--squid-red);
  text-shadow:3px 3px 0 var(--ink);
  text-align:center;
}
.reaction-text{
  font-size:13px;text-align:center;
  line-height:1.6;color:var(--ink);
}
.next-btn{
  background:var(--squid-pink);
  color:white;border:3px solid var(--ink);
  padding:10px 30px;
  font-family:'Jua',sans-serif;font-size:15px;
  cursor:pointer;
  box-shadow:4px 4px 0 var(--ink);
  transition:all .15s;
  width:100%;
}
.next-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);}

/* ── 결과 화면 ── */
#result{
  position:fixed;inset:0;
  background:var(--squid-dark);
  z-index:900;display:none;
  align-items:center;justify-content:center;
  padding:16px;overflow-y:auto;
}
.result-wrap{
  background:var(--panel-bg);
  border:4px solid var(--ink);
  max-width:400px;width:100%;
  box-shadow:10px 10px 0 var(--squid-pink);
  animation:comicPop .6s ease both;
}
.result-header{
  background:var(--squid-pink);
  color:white;
  text-align:center;
  padding:14px;
  border-bottom:4px solid var(--ink);
  position:relative;overflow:hidden;
}
.result-mbti-big{
  font-size:52px;letter-spacing:8px;
  text-shadow:4px 4px 0 var(--ink);
}
.result-label{font-size:12px;opacity:.8;letter-spacing:2px;}
.result-char-panel{
  height:200px;
  border-bottom:3px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  background:#fff;position:relative;overflow:hidden;
}
.result-body{padding:16px;}
.result-nickname{
  font-size:18px;color:var(--squid-pink);
  text-align:center;margin-bottom:10px;
}
.result-desc{
  font-size:12px;line-height:1.7;
  background:#FFF8E1;
  border:2px solid var(--squid-yellow);
  padding:12px;margin-bottom:12px;
}
.result-tags{
  display:flex;flex-wrap:wrap;gap:6px;
  margin-bottom:14px;
}
.result-tag{
  background:var(--ink);color:white;
  padding:4px 10px;font-size:11px;
}
.teacher-quote{
  background:var(--squid-dark);color:var(--squid-yellow);
  padding:10px;font-size:11px;line-height:1.6;
  text-align:center;margin-bottom:14px;
  border:2px solid var(--squid-pink);
}
.restart-btn{
  background:var(--squid-teal);
  color:white;border:3px solid var(--ink);
  padding:12px;width:100%;
  font-family:'Jua',sans-serif;font-size:16px;
  cursor:pointer;
  box-shadow:4px 4px 0 var(--ink);
  transition:all .15s;
}
.restart-btn:hover{transform:translate(-2px,-2px);}

/* 꽃가루 */
.confetti-piece{
  position:fixed;
  font-size:20px;
  pointer-events:none;
  animation:fall 3s ease-in forwards;
}
@keyframes fall{
  0%{transform:translateY(-40px) rotate(0);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
</style>
</head>
<body>

<!-- ════ 인트로 ════ -->
<div id="intro">
  <div class="intro-doll">
    <svg width="120" height="160" viewBox="0 0 120 160">
      <!-- 오징어 선생님 인형 - 마스크 버전 -->
      <!-- 몸통 핑크 트레이닝복 -->
      <ellipse cx="60" cy="110" rx="34" ry="42" fill="#E84393"/>
      <rect x="26" y="90" width="68" height="50" rx="8" fill="#E84393"/>
      <!-- 팔 -->
      <rect x="2" y="88" width="24" height="12" rx="6" fill="#E84393"/>
      <rect x="94" y="88" width="24" height="12" rx="6" fill="#E84393"/>
      <!-- 다리 -->
      <rect x="32" y="138" width="16" height="22" rx="6" fill="#E84393"/>
      <rect x="72" y="138" width="16" height="22" rx="6" fill="#E84393"/>
      <!-- 마스크 (원형) -->
      <circle cx="60" cy="60" r="34" fill="#2a2a2a" stroke="#111" stroke-width="3"/>
      <!-- 마스크 기호: 원 -->
      <circle cx="60" cy="60" r="16" fill="none" stroke="#E84393" stroke-width="3"/>
      <!-- 눈 (반짝이는 귀여운 눈) -->
      <circle cx="52" cy="56" r="5" fill="white"/>
      <circle cx="68" cy="56" r="5" fill="white"/>
      <circle cx="53" cy="56" r="3" fill="#111"/>
      <circle cx="69" cy="56" r="3" fill="#111"/>
      <circle cx="54" cy="55" r="1" fill="white"/>
      <circle cx="70" cy="55" r="1" fill="white"/>
      <!-- 입 (미소) -->
      <path d="M52 67 Q60 73 68 67" stroke="#E84393" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- 볼 홍조 -->
      <ellipse cx="46" cy="65" rx="5" ry="3" fill="#FF80B5" opacity=".5"/>
      <ellipse cx="74" cy="65" rx="5" ry="3" fill="#FF80B5" opacity=".5"/>
      <!-- 머리카락? 삐죽 -->
      <path d="M36 30 Q32 10 40 8 Q44 24 46 28" fill="#1a1a1a"/>
      <path d="M84 30 Q88 10 80 8 Q76 24 74 28" fill="#1a1a1a"/>
    </svg>
  </div>
  <div class="intro-logo">🦑 놀이터 오징어<br>대회전!</div>
  <div class="intro-sub">⚡ 나만의 MBTI 스타일을 찾아라! ⚡</div>
  <div class="intro-shapes">
    <div class="intro-shape shape-circle">○</div>
    <div class="intro-shape shape-tri" style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;">△</div>
    <div class="intro-shape">□</div>
  </div>
  <div class="intro-desc">
    12번의 선택으로 나만의 놀이터 스타일 발견!<br>
    말풍선을 골라가며 스토리를 완성해봐! 🎭
  </div>
  <button class="start-btn" onclick="startGame()">▶ 대회전 시작!</button>
</div>

<!-- ════ 게임 화면 ════ -->
<div id="game" style="display:none;flex-direction:column;height:100vh;">
  <div class="hud">
    <div class="hud-chapter" id="hudChapter">📍 챕터 1</div>
    <div class="hud-progress"><div class="hud-bar" id="hudBar" style="width:0%"></div></div>
    <div class="hud-count" id="hudCount">1/12</div>
  </div>
  <div class="comic-area">
    <div class="panels-wrap layout-2row" id="panelsWrap"></div>
    <div class="choice-area">
      <div class="choice-question" id="choiceQ"></div>
      <div class="choices-grid" id="choicesGrid"></div>
    </div>
  </div>
</div>

<!-- ════ 반응 팝업 ════ -->
<div id="reaction" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:center;justify-content:center;padding:20px;">
  <div class="reaction-comic">
    <div class="reaction-panel" id="reactionPanel"></div>
    <div class="reaction-info">
      <div class="reaction-sfx-big" id="reactionSfx"></div>
      <div class="reaction-text" id="reactionText"></div>
      <button class="next-btn" onclick="nextChapter()">다음 챕터로! ▶</button>
    </div>
  </div>
</div>

<!-- ════ 결과 ════ -->
<div id="result" style="display:none;position:fixed;inset:0;background:var(--squid-dark);z-index:900;align-items:center;justify-content:center;padding:16px;overflow-y:auto;">
  <div class="result-wrap" id="resultWrap"></div>
</div>

<script>
// ══════════════ SVG 캐릭터 드로잉 함수 ══════════════

function svgTeacher(x,y,scale=1,expression='normal'){
  const e = expression;
  const mouth = e==='happy' ? `<path d="M${x-8} ${y+12} Q${x} ${y+18} ${x+8} ${y+12}" stroke="#E84393" stroke-width="2.5" fill="none" stroke-linecap="round"/>` :
                e==='shock' ? `<circle cx="${x}" cy="${y+14}" r="4" fill="#333"/>` :
                e==='sweat' ? `<path d="M${x-6} ${y+12} Q${x} ${y+18} ${x+6} ${y+12}" stroke="#E84393" stroke-width="2" fill="none"/><ellipse cx="${x+14}" cy="${y+8}" rx="2" ry="4" fill="#6EC6FF"/>` :
                `<path d="M${x-7} ${y+12} Q${x} ${y+17} ${x+7} ${y+12}" stroke="#E84393" stroke-width="2" fill="none" stroke-linecap="round"/>`;
  return `
  <g transform="scale(${scale}) translate(${x*(1-scale)/scale},${y*(1-scale)/scale})">
    <!-- 몸 -->
    <ellipse cx="${x}" cy="${y+55}" rx="22" ry="28" fill="#E84393"/>
    <rect x="${x-22}" y="${y+40}" width="44" height="32" rx="6" fill="#E84393"/>
    <!-- 팔 -->
    <rect x="${x-38}" y="${y+38}" width="18" height="9" rx="5" fill="#E84393"/>
    <rect x="${x+20}" y="${y+38}" width="18" height="9" rx="5" fill="#E84393"/>
    <!-- 마스크 -->
    <circle cx="${x}" cy="${y}" r="22" fill="#222" stroke="#111" stroke-width="2"/>
    <circle cx="${x}" cy="${y}" r="10" fill="none" stroke="#E84393" stroke-width="2.5"/>
    <!-- 눈 -->
    <circle cx="${x-7}" cy="${y-4}" r="4" fill="white"/>
    <circle cx="${x+7}" cy="${y-4}" r="4" fill="white"/>
    <circle cx="${x-6}" cy="${y-4}" r="2.5" fill="#111"/>
    <circle cx="${x+8}" cy="${y-4}" r="2.5" fill="#111"/>
    <circle cx="${x-5}" cy="${y-5}" r="1" fill="white"/>
    <circle cx="${x+9}" cy="${y-5}" r="1" fill="white"/>
    ${e==='shock'?`<path d="M${x-8} ${y-10} L${x-6} ${y-15} L${x-4} ${y-10}" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M${x+4} ${y-10} L${x+6} ${y-15} L${x+8} ${y-10}" fill="none" stroke="white" stroke-width="1.5"/>`:
    e==='sweat'?`<path d="M${x-8} ${y-8} Q${x-7} ${y-12} ${x-5} ${y-8}" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M${x+4} ${y-8} Q${x+5} ${y-12} ${x+7} ${y-8}" fill="none" stroke="white" stroke-width="1.5"/>`:
    `<path d="M${x-9} ${y-9} Q${x-7} ${y-13} ${x-4} ${y-9}" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M${x+3} ${y-9} Q${x+5} ${y-13} ${x+8} ${y-9}" fill="none" stroke="white" stroke-width="1.5"/>`}
    <!-- 입 -->
    ${mouth}
    <!-- 볼 -->
    <ellipse cx="${x-14}" cy="${y+7}" rx="4" ry="2.5" fill="#FF80B5" opacity=".5"/>
    <ellipse cx="${x+14}" cy="${y+7}" rx="4" ry="2.5" fill="#FF80B5" opacity=".5"/>
  </g>`;
}

function svgKid(x,y,color='#4ECDC4',expression='smile',hat=''){
  const mouth = expression==='smile' ? `<path d="M${x-7} ${y+10} Q${x} ${y+16} ${x+7} ${y+10}" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>` :
                expression==='surprise' ? `<ellipse cx="${x}" cy="${y+12}" rx="4" ry="4.5" fill="white" stroke="#333" stroke-width="1.5"/>` :
                expression==='cry' ? `<path d="M${x-6} ${y+13} Q${x} ${y+9} ${x+6} ${y+13}" stroke="#333" stroke-width="2" fill="none"/>` :
                `<line x1="${x-6}" y1="${y+11}" x2="${x+6}" y2="${y+11}" stroke="#333" stroke-width="2"/>`;
  const tears = expression==='cry' ? `<ellipse cx="${x-9}" cy="${y+14}" rx="1.5" ry="3" fill="#6EC6FF"/><ellipse cx="${x+9}" cy="${y+14}" rx="1.5" ry="3" fill="#6EC6FF"/>` : '';
  return `
    <!-- 키드 머리카락 -->
    <ellipse cx="${x}" cy="${y-18}" rx="16" ry="8" fill="#5D4037"/>
    <ellipse cx="${x-12}" cy="${y-15}" rx="6" ry="10" fill="#5D4037"/>
    <ellipse cx="${x+12}" cy="${y-15}" rx="6" ry="10" fill="#5D4037"/>
    <!-- 얼굴 -->
    <circle cx="${x}" cy="${y}" r="18" fill="#FFD39B" stroke="#333" stroke-width="2"/>
    <!-- 눈 -->
    <ellipse cx="${x-6}" cy="${y-3}" rx="3.5" ry="4" fill="white" stroke="#333" stroke-width="1"/>

    <circle cx="${x-5}" cy="${y-3}" r="2" fill="#333"/>
    <circle cx="${x+7}" cy="${y-3}" r="2" fill="#333"/>
    <circle cx="${x-4}" cy="${y-5}" r=".8" fill="white"/>
    <circle cx="${x+8}" cy="${y-5}" r=".8" fill="white"/>
    ${mouth}${tears}
    <!-- 볼 -->
    <ellipse cx="${x-12}" cy="${y+5}" rx="4" ry="2.5" fill="#FFB3BA" opacity=".7"/>
    <ellipse cx="${x+12}" cy="${y+5}" rx="4" ry="2.5" fill="#FFB3BA" opacity=".7"/>
    <!-- 몸 -->
    <rect x="${x-14}" y="${y+18}" width="28" height="24" rx="6" fill="${color}" stroke="#333" stroke-width="2"/>
    <!-- 팔 -->
    <rect x="${x-26}" y="${y+20}" width="14" height="8" rx="4" fill="${color}" stroke="#333" stroke-width="1.5"/>
    <rect x="${x+12}" y="${y+20}" width="14" height="8" rx="4" fill="${color}" stroke="#333" stroke-width="1.5"/>`;
}

function svgBackground(type){
  if(type==='playground') return `
    <rect width="100%" height="100%" fill="#87CEEB"/>
    <rect y="75%" width="100%" height="25%" fill="#90EE90"/>
    <rect x="10%" y="40%" width="6%" height="40%" rx="3" fill="#8B4513"/>
    <rect x="5%" y="35%" width="18%" height="8%" rx="4" fill="#FF6B35"/>
    <rect x="65%" y="30%" width="8%" height="55%" rx="4" fill="#888"/>
    <rect x="60%" y="20%" width="18%" height="5%" rx="3" fill="#4CAF50"/>
    <ellipse cx="20%" cy="80%" rx="12%" ry="5%" fill="#C8A96E" opacity=".5"/>`;
  if(type==='sandpit') return `
    <rect width="100%" height="100%" fill="#FFF8DC"/>
    <rect y="60%" width="100%" height="40%" fill="#DEB887"/>
    <ellipse cx="50%" cy="70%" rx="40%" ry="20%" fill="#D2B48C" stroke="#A0826D" stroke-width="3"/>`;
  if(type==='dark') return `
    <rect width="100%" height="100%" fill="#1a0a2e"/>
    <circle cx="20%" cy="15%" r="3%" fill="#FFD600" opacity=".8"/>
    <circle cx="80%" cy="10%" r="2%" fill="#FFD600" opacity=".6"/>
    <circle cx="60%" cy="25%" r="1.5%" fill="white" opacity=".4"/>`;
  if(type==='rain') return `
    <rect width="100%" height="100%" fill="#B0C4DE"/>
    <rect width="100%" height="100%" fill="rgba(100,149,237,.3)"/>
    ${Array.from({length:20},(_,i)=>`<line x1="${5+i*5}%" y1="0" x2="${3+i*5}%" y2="15%" stroke="#6EC6FF" stroke-width="1.5" opacity=".6"/>`).join('')}`;
  return `<rect width="100%" height="100%" fill="#f5f5f5"/>`;
}

function speedLines(cx,cy,color='#FFD600'){
  return Array.from({length:12},(_,i)=>{
    const a=(i/12)*Math.PI*2;
    return `<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(a)*200}" y2="${cy+Math.sin(a)*200}" stroke="${color}" stroke-width="1" opacity=".15"/>`;
  }).join('');
}

const mbtiTypes={

  ENFP:{nick:"놀이터의 신나는 폭발왕 🎆",char:"rocket",color:"#FF6B35",desc:"매일 새로운 아이디어로 놀이터를 신나게! 뭐든 재밌어 보이는 타입!",tags:["아이디어","에너지","호기심"]},
  ENTJ:{nick:"놀이터의 전략 대장 ⚔️",char:"crown",color:"#9B59B6",desc:"놀이터를 완벽하게 정복하는 전략가! 오징어 선생님도 쩔쩔매!",tags:["전략","결단력","리더"]},
  ENTP:{nick:"놀이터의 아이디어 폭발기 💡",char:"bulb",color:"#3498DB",desc:"엉뚱하고 기발한 아이디어로 모두를 놀라게! 허를 찌르는 천재!",tags:["기발함","유연성","창의력"]},
  ESFJ:{nick:"놀이터의 따뜻한 햇살 ☀️",char:"sun",color:"#F39C12",desc:"모든 친구 챙겨주는 따뜻한 마음씨! 아무도 외롭지 않게!",tags:["케어왕","따뜻함","책임감"]},
  ESFP:{nick:"놀이터의 흥 폭발 DJ 🎵",char:"music",color:"#E84393",desc:"어디서든 신나는 분위기를 만드는 흥부자! 비 와도 춤추는 타입!",tags:["흥부자","현재","분위기 메이커"]},

  INFJ:{nick:"놀이터의 신비한 예언자 🔮",char:"crystal",color:"#8E44AD",desc:"친구들 마음을 신기하게 잘 아는 타입! 오징어 선생님 다음 행동도 예측!",tags:["공감","통찰력","신비로움"]},
  INFP:{nick:"놀이터의 꿈꾸는 시인 🌈",char:"rainbow",color:"#1ABC9C",desc:"마음속에 무지개가 가득한 몽상가! 모래성 하나에도 이야기를 만드는 타입!",tags:["상상력","따뜻함","스토리텔러"]},
  INTJ:{nick:"놀이터의 천재 설계자 🧠",char:"brain",color:"#2980B9",desc:"모든 걸 미리 계획하고 완벽 실행! 오징어 선생님 반칙까지 예측!",tags:["전략","독립심","완벽 계획"]},
  INTP:{nick:"놀이터의 분석 마법사 🔭",char:"telescope",color:"#16A085",desc:"모든 걸 분석하고 이해하려는 지식 탐험가! 왜? 어떻게?를 끊임없이!",tags:["분석력","호기심","논리"]},

  ISTJ:{nick:"놀이터의 믿음직한 기둥 🏛️",char:"pillar",color:"#7F8C8D",desc:"한 번 정한 건 끝까지 책임지는 신뢰의 아이콘! 오징어 선생님도 함부로 못 해!",tags:["책임감","꼼꼼함","신뢰"]},
  ISTP:{nick:"놀이터의 쿨한 문제해결사 🔧",char:"wrench",color:"#BDC3C7",desc:"어떤 상황에서도 쿨하게 해결책 찾는 타입! 함정도 혼자 조용히 해결!",tags:["문제해결","침착함","실용적"]}

// ══════════════ 게임 상태 ══════════════
let scores={E:0,I:0,S:0,N:0,F:0,T:0,J:0,P:0};
let cur=0;
let picked=false;

function startGame(){
  document.getElementById('intro').style.display='none';
  const g=document.getElementById('game');
  g.style.display='flex';
  renderChapter();
}

function renderChapter(){
  const ch=chapters[cur];
  const pct=Math.round((cur/chapters.length)*100);
  document.getElementById('hudBar').style.width=pct+'%';
  document.getElementById('hudChapter').textContent='📍 '+ch.title;
  document.getElementById('hudCount').textContent=(cur+1)+'/'+chapters.length;
  picked=false;

  // 패널 렌더
  const wrap=document.getElementById('panelsWrap');
  wrap.innerHTML='';

  ch.panels.forEach((p,i)=>{
    const panel=document.createElement('div');
    panel.className='panel';
    panel.id='panel'+i;
    const svgEl=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svgEl.style.cssText='width:100%;height:100%;';
    svgEl.setAttribute('viewBox','0 0 400 240');
    svgEl.setAttribute('preserveAspectRatio','xMidYMid meet');
    svgEl.innerHTML=p.svg(400,240);
    if(p.caption){
      const cap=document.createElement('div');
      cap.className='caption';
      cap.textContent=p.caption;
      panel.appendChild(cap);
    }
    panel.appendChild(svgEl);
    wrap.appendChild(panel);
  });

  // 선택지 렌더
  document.getElementById('choiceQ').textContent=ch.question;
  const grid=document.getElementById('choicesGrid');
  grid.innerHTML='';
  ch.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-card '+c.cls;
    btn.innerHTML=`<span class="choice-icon-big">${c.icon}</span><span>${c.label}</span><span class="choice-sfx">${c.sfx}</span>`;
    btn.onclick=()=>pick(i);
    grid.appendChild(btn);
  });
}

function pick(idx){
  if(picked)return;
  picked=true;

  const ch=chapters[cur];
  const c=ch.choices[idx];

  // 점수
  if(c.axis==='E')scores.E+=2;
  else if(c.axis==='I')scores.I+=2;
  else if(c.axis==='EI_n'){scores.E+=1;scores.I+=1;}
  else if(c.axis==='S')scores.S+=2;
  else if(c.axis==='N')scores.N+=2;
  else if(c.axis==='SN_n'){scores.S+=1;scores.N+=1;}
  else if(c.axis==='F')scores.F+=2;
  else if(c.axis==='T')scores.T+=2;
  else if(c.axis==='FT_n'){scores.F+=1;scores.T+=1;}
  else if(c.axis==='J')scores.J+=2;
  else if(c.axis==='P')scores.P+=2;
  else if(c.axis==='JP_n'){scores.J+=1;scores.P+=1;}

  // 반응 팝업
  const r=ch.reactions[idx];
  const rPanel=document.getElementById('reactionPanel');
  rPanel.innerHTML='';
  const svgR=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgR.style.cssText='width:100%;height:100%;';
  svgR.setAttribute('viewBox','0 0 400 240');
  svgR.setAttribute('preserveAspectRatio','xMidYMid meet');
  svgR.innerHTML=r.panel(400,240);
  rPanel.appendChild(svgR);

  document.getElementById('reactionSfx').textContent=r.sfx;
  const rt=document.getElementById('reactionText');
  rt.textContent=r.text;
  rt.style.whiteSpace='pre-line';

  const rp=document.getElementById('reaction');
  rp.style.display='flex';
}

function nextChapter(){
  document.getElementById('reaction').style.display='none';
  cur++;
  if(cur>=chapters.length) showResult();
  else renderChapter();
}

function showResult(){
  // MBTI 계산
  const ei=scores.E>=scores.I?'E':'I';
  const sn=scores.S>=scores.N?'S':'N';
  const ft=scores.F>=scores.T?'F':'T';
  const jp=scores.J>=scores.P?'J':'P';
  const mbti=ei+sn+ft+jp;
  const info=mbtiTypes[mbti]||mbtiTypes.ENFP;

  const wrap=document.getElementById('resultWrap');
  wrap.innerHTML=`
    <div class="result-header" style="background:${info.color}">
      <div class="result-label">🦑 나만의 놀이터 스타일 공개!</div>
      <div class="result-mbti-big">${mbti}</div>
    </div>
    <div class="result-char-panel">
      <svg width="100%" height="100%" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
        ${svgBackground('playground')}
        ${speedLines(200,100,'#FFD600')}
        ${svgKid(200,95,'${info.color}','smile')}
        <text x="100" y="175" font-family="Jua,sans-serif" font-size="13" fill="white" text-anchor="middle"
          style="filter:drop-shadow(2px 2px 0 #111)">${mbti} 유형!</text>
      </svg>
    </div>
    <div class="result-body">
      <div class="result-nickname">${info.nick}</div>
      <div class="result-desc">${info.desc}</div>
      <div class="result-tags">
        ${info.tags.map(t=>`<span class="result-tag">#${t}</span>`).join('')}
      </div>
      <div class="teacher-quote">
        🦑 오징어 선생님: <br>
        <strong>"${mbti}라고?! 역시 내 눈은 틀리지 않았어!<br>너의 스타일... 최강이야! 합격! 🎊"</strong>
      </div>
      <button class="restart-btn" onclick="restart()">🔄 다시 도전!</button>
    </div>
  `;
  document.getElementById('result').style.display='flex';
  launchConfetti();
}

function restart(){
  scores={E:0,I:0,S:0,N:0,F:0,T:0,J:0,P:0};
  cur=0;picked=false;
  document.getElementById('result').style.display='none';
  renderChapter();
}

function launchConfetti(){
  const emojis=['🎊','🎉','⭐','🌟','💫','🦑','💍','🏆','✨'];
  for(let i=0;i<18;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left=Math.random()*100+'vw';
      el.style.top='-30px';
      el.style.animationDuration=(2+Math.random()*2)+'s';
      el.style.fontSize=(14+Math.random()*16)+'px';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    },i*180);
  }
}
</script>
